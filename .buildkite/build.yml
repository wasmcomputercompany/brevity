steps:
  - label: ":gradle: Build"
    commands:
      - "cat .buildkite/gradle.properties >> gradle.properties"
      - "gradle jvmTest"
    plugins:
      - docker#v5.13.0:
          image: wasmo/ci@sha256:26863f05fa741dfe1872fc589f8517c190f7aca242c3aedc35190267a419fb5b
          run: ci-build
          environment:
            - "BUILDKITE_ANALYTICS_TOKEN"
            - "BUILDKITE_BRANCH"
            - "BUILDKITE_BUILD_ID"
            - "BUILDKITE_BUILD_NUMBER"
            - "BUILDKITE_BUILD_URL"
            - "BUILDKITE_COMMIT"
            - "BUILDKITE_JOB_ID"
            - "BUILDKITE_MESSAGE"
      - docker-login#v3.0.0:
          username: wasmo
          isolate-config: false
      - test-collector#v1.0.0:
          files: "*/test-results/*.xml"
          format: "junit"
    secrets:
      BUILDKITE_ANALYTICS_TOKEN: WASMO_BUILDKITE_ANALYTICS_TOKEN
      DOCKER_LOGIN_PASSWORD: DOCKER_LOGIN_PASSWORD
